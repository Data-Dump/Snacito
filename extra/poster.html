<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNACITO – One Day Only | Campus Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet" />

    <style>
        /* ── Reset ───────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── A4 Canvas ───────────────────────── */
        body {
            background: #e8e0d8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
        }

        .poster {
            width: 794px;
            /* A4 @ 96 dpi */
            min-height: 1123px;
            background: #fdf8f3;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.18);
        }

        /* ── Subtle texture layer ──────────── */
        .poster::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 5%, rgba(255, 220, 180, 0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 92%, rgba(255, 200, 160, 0.18) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top accent bar ──────────────── */
        .top-bar {
            height: 5px;
            background: linear-gradient(90deg, #e8c49a 0%, #d4956a 50%, #e8c49a 100%);
            flex-shrink: 0;
        }

        /* ── SECTION 1: HEADER ───────────── */
        .header {
            position: relative;
            z-index: 1;
            padding: 46px 64px 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .event-eyebrow {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c77a44;
            margin-bottom: 18px;
        }

        .headline {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 72px;
            line-height: 1;
            letter-spacing: -3px;
            color: #1a1208;
            text-transform: uppercase;
        }

        .headline span {
            color: #c7703c;
        }

        .subheadline {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #8b5a2b;
            margin-top: 10px;
        }

        .date-line {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 13px;
            color: #9e7c5a;
            letter-spacing: 1px;
            margin-top: 16px;
        }

        .divider {
            width: 60px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4956a, transparent);
            margin: 22px auto 0;
        }

        /* ── SECTION 2: HERO VISUAL ────────── */
        .hero {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            margin: 0 64px;
            height: 320px;
            background: linear-gradient(160deg, #fff9f4 0%, #fef0e3 100%);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                inset 0 0 0 1px rgba(210, 150, 100, 0.15),
                0 8px 40px rgba(180, 100, 50, 0.10);
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: saturate(1.05) brightness(1.03);
        }

        /* Soft vignette over image */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 110%, rgba(253, 248, 243, 0.55) 0%, transparent 60%),
                radial-gradient(ellipse at -5% 50%, rgba(253, 248, 243, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 105% 50%, rgba(253, 248, 243, 0.4) 0%, transparent 40%);
            pointer-events: none;
        }

        /* ── SECTION 3: CORE OFFER ─────────── */
        .offer {
            position: relative;
            z-index: 1;
            padding: 36px 64px 0;
            text-align: center;
            flex-shrink: 0;
        }

        .offer-headline {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 30px;
            color: #1a1208;
            letter-spacing: -0.5px;
        }

        .offer-headline em {
            font-style: normal;
            color: #c7703c;
        }

        .offer-divider {
            width: 40px;
            height: 1px;
            background: #d4956a;
            margin: 14px auto;
            opacity: 0.6;
        }

        .menu-items {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .menu-item {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14.5px;
            color: #6b4c30;
            letter-spacing: 0.5px;
        }

        .menu-sep {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #d4956a;
            margin: 0 14px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* ── SECTION 4: PRICE BADGE ────────── */
        .price-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            padding: 30px 64px 0;
            flex-shrink: 0;
        }

        .price-badge {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #fff3e8 0%, #fde8d2 100%);
            border: 1.5px solid rgba(199, 112, 60, 0.25);
            border-radius: 50px;
            padding: 16px 44px;
            box-shadow:
                0 4px 24px rgba(199, 112, 60, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .price-label {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #b07040;
            margin-bottom: 4px;
        }

        .price-value {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 36px;
            color: #1a1208;
            letter-spacing: -1px;
            line-height: 1;
        }

        .price-value span {
            color: #c7703c;
        }

        /* ── SECTION 5: URGENCY BLOCK ─────── */
        .urgency {
            position: relative;
            z-index: 1;
            padding: 34px 64px 0;
            text-align: center;
            flex-shrink: 0;
        }

        .urgency-lines {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 4px;
        }

        .urgency-tag {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #c7703c;
            background: rgba(199, 112, 60, 0.08);
            padding: 6px 16px;
            border-radius: 4px;
        }

        /* ── FOOTER BLOCK ──────────────────── */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: auto;
            padding: 28px 64px 32px;
            text-align: center;
            flex-shrink: 0;
        }

        .footer-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180, 120, 70, 0.3), transparent);
            margin-bottom: 22px;
        }

        .location-text {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            color: #8b6640;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
        }

        .location-text strong {
            font-weight: 700;
            color: #5c3d1e;
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .social-icon {
            width: 22px;
            height: 22px;
            opacity: 0.75;
        }

        .social-handle {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: #8b6640;
            letter-spacing: 0.5px;
        }

        /* ── Bottom accent ───────────────── */
        .bottom-bar {
            height: 5px;
            background: linear-gradient(90deg, #e8c49a 0%, #d4956a 50%, #e8c49a 100%);
            flex-shrink: 0;
        }

        /* ── PRINT STYLES ─────────────────── */
        @media print {
            body {
                background: none;
                padding: 0;
            }

            .poster {
                width: 210mm;
                min-height: 297mm;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="poster">
        <div class="top-bar"></div>

        <!-- SECTION 1: BIG IMPACT HEADER -->
        <header class="header">
            <p class="event-eyebrow">Campus Food Event &nbsp;·&nbsp; One Day Only</p>
            <h1 class="headline">SNACI<span>TO</span><br>IS COMING.</h1>
            <p class="subheadline">One Day Only.</p>
            <p class="date-line">Live at Campus &nbsp;·&nbsp; March 6th, 2026</p>
            <div class="divider"></div>
        </header>

        <!-- SECTION 2: HERO VISUAL -->
        <div class="hero">
            <img src="hero_food.png" alt="Golden waffles with chocolate drizzle and mini choco puffs" />
        </div>

        <!-- SECTION 3: CORE OFFER -->
        <section class="offer">
            <p class="offer-headline">Fresh. Hot. <em>Made Live.</em></p>
            <div class="offer-divider"></div>
            <div class="menu-items">
                <span class="menu-item">Waffles</span>
                <span class="menu-sep"></span>
                <span class="menu-item">Mini Choco Puffs</span>
                <span class="menu-sep"></span>
                <span class="menu-item">Chocolate Specials</span>
            </div>
        </section>

        <!-- SECTION 4: PRICE HOOK -->
        <div class="price-wrap">
            <div class="price-badge">
                <span class="price-label">Starting at</span>
                <span class="price-value"><span>₹</span>39</span>
            </div>
        </div>

        <!-- SECTION 5: URGENCY -->
        <section class="urgency">
            <div class="urgency-lines">
                <span class="urgency-tag">Limited Batches</span>
                <span class="urgency-tag">Until Sold Out</span>
            </div>
        </section>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-divider"></div>
            <p class="location-text">Find us at the <strong>Aarohan Stall Area</strong></p>
            <div class="social-row">
                <!-- Instagram icon (inline SVG, no external dependency) -->
                <svg class="social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="#8b6640" stroke-width="1.8" />
                    <circle cx="12" cy="12" r="4.2" stroke="#8b6640" stroke-width="1.8" />
                    <circle cx="17.2" cy="6.8" r="1" fill="#8b6640" />
                </svg>
                <span class="social-handle">@snacito</span>
            </div>
        </footer>

        <div class="bottom-bar"></div>
    </div>
</body>

</html>
