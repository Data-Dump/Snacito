<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNACITO - Stall Nameplate A3</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e0d8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .nameplate {
            width: 420mm;
            height: 297mm;
            background: #fdf8f3;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.18);
            border: 2px solid rgba(180, 120, 70, 0.2);
        }

        /* Subtle texture layer */
        .nameplate::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 5%, rgba(255, 220, 180, 0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 92%, rgba(255, 200, 160, 0.18) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 24px;
            color: #c7703c;
            /* Brighter orange to stand out */
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 4px 12px rgba(180, 100, 50, 0.15);
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 320px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 12px;
            color: #1a1208;
            margin-bottom: 60px;
            margin-left: 12px;
            /* Offset for letter-spacing */
            text-shadow: 12px 12px 0 rgba(199, 112, 60, 0.25), 0 20px 40px rgba(0, 0, 0, 0.1);
            transform: scaleY(1.1);
            /* Taller text for impact */
        }

        .brand-name span {
            color: #c7703c;
        }

        .tags {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .tag {
            font-family: 'Inter', sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #c7703c;
            text-transform: uppercase;
            padding: 24px 60px;
            border: 3px solid rgba(199, 112, 60, 0.25);
            border-radius: 100px;
            background: linear-gradient(135deg, #fff3e8 0%, #fde8d2 100%);
            box-shadow: 0 10px 40px rgba(180, 100, 50, 0.10);
        }

        /* Top and bottom accent bars */
        .top-bar,
        .bottom-bar {
            position: absolute;
            left: 0;
            right: 0;
            height: 36px;
            background: linear-gradient(90deg, #e8c49a 0%, #d4956a 50%, #e8c49a 100%);
            z-index: 20;
        }

        .top-bar {
            top: 0;
            box-shadow: 0 4px 20px rgba(180, 100, 50, 0.3);
        }

        .bottom-bar {
            bottom: 0;
            box-shadow: 0 -4px 20px rgba(180, 100, 50, 0.3);
        }

        /* Border visuals */
        .food-graphic {
            position: absolute;
            z-index: 5;
            opacity: 0.95;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.2));
            pointer-events: none;
        }

        .food-graphic.left {
            left: -120px;
            bottom: -80px;
            width: 580px;
            transform: rotate(15deg);
        }

        .food-graphic.right {
            right: -80px;
            top: -60px;
            width: 520px;
            transform: rotate(-10deg);
        }

        @media print {
            @page {
                size: A3 landscape;
                margin: 0;
            }

            html,
            body {
                width: 420mm;
                height: 297mm;
                margin: 0;
                padding: 0;
                background: none;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .nameplate {
                width: 420mm;
                height: 297mm;
                box-shadow: none;
                border: none;
            }

            .food-graphic {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>
    <div class="nameplate">
        <div class="top-bar"></div>
        <img src="hero_food.png" alt="" class="food-graphic left" />
        <img src="hero_food.png" alt="" class="food-graphic right" />
        <div class="content">
            <div class="subtitle">The Exclusive Live Stall</div>
            <div class="brand-name">SNA<span>CITO</span></div>
            <div class="tags">
                <div class="tag">Waffles</div>
                <div class="tag">Mini Choco Puffs</div>
            </div>
        </div>
        <div class="bottom-bar"></div>
    </div>
</body>

</html>
